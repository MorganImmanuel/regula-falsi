<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Regula Falsi Clean Fullscreen Large Fixed</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1"></script>
    <style>
        html, body { 
            height: 100vh; 
            overflow: hidden; 
            background-color: #f8f9fa; 
        }
        .main-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 15px 20px;
        }
        .header-title {
            margin-bottom: 10px;
            font-size: 24px;
        }
        .card { 
            box-shadow: 0 2px 5px rgba(0,0,0,0.08); 
            border: none; 
            border-radius: 8px;
        }
        #output-box { 
            font-family: monospace; 
            white-space: pre-wrap; 
            background: #212529; 
            color: #f8f9fa; 
            padding: 12px 16px; 
            border-radius: 6px; 
            height: 100%;
            font-size: 13px;
            margin: 0;
            line-height: 1.5;
        }
        .content-row {
            flex: 1;
            min-height: 0;
        }
        .table-responsive { 
            height: 100%; 
            overflow-y: auto; 
        }
        th { 
            background-color: #0d6efd !important; 
            color: white !important; 
            font-size: 12px; 
            padding: 6px !important;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        td { 
            font-size: 12px; 
            padding: 6px !important;
        }
        #canvas-container { 
            position: relative; 
            width: 100%; 
            height: 100%; 
        }
        .form-label {
            margin-bottom: 4px;
            font-size: 13px;
            font-weight: 600;
            color: #495057;
        }
        .form-control {
            padding: 6px 12px;
            font-size: 13px;
        }
        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #6c757d;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <h2 class="text-center fw-bold text-primary header-title">PROGRAM REGULA FALSI</h2>
    
    <div class="row g-3 mb-3" style="height: 200px;">
        <div class="col-md-4 h-100">
            <div class="card p-3 h-100 justify-content-center">
                <div class="row g-2">
                    <div class="col-12">
                        <label class="form-label">Fungsi f(x)</label>
                        <input type="text" id="fungsi_raw" class="form-control" value="x^3 - 2x - 5">
                    </div>
                    <div class="col-4">
                        <label class="form-label">Batas a</label>
                        <input type="number" id="a_awal" class="form-control" value="1" step="any">
                    </div>
                    <div class="col-4">
                        <label class="form-label">Batas b</label>
                        <input type="number" id="b_awal" class="form-control" value="3" step="any">
                    </div>
                    <div class="col-4">
                        <label class="form-label">Toleransi</label>
                        <input type="number" id="tol" class="form-control" value="0.0001" step="any">
                    </div>
                    <div class="col-12 mt-2">
                        <button onclick="hitungRegulaFalsi()" class="btn btn-primary w-100 fw-bold py-2" style="font-size: 13px;">PROSES HITUNG</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-8 h-100">
            <div class="card p-3 h-100">
                <p class="section-title">Monitor Status & Laporan</p>
                <pre id="output-box">Klik "PROSES HITUNG" untuk memulai pengujian...</pre>
            </div>
        </div>
    </div>

    <div class="row g-3 content-row">
        <div class="col-md-7 h-100">
            <div class="card p-3 h-100">
                <p class="section-title">Tabel Iterasi</p>
                <div id="tabel-container" class="table-responsive">
                    <p class="text-muted text-center pt-5 small">Data tabel akan dimuat di sini setelah kalkulasi sukses.</p>
                </div>
            </div>
        </div>
        
        <div class="col-md-5 h-100">
            <div class="card p-3 h-100">
                <p class="section-title">Visualisasi Grafik</p>
                <div id="canvas-container">
                    <canvas id="grafikChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let chartInstance = null;

function evaluasiFungsi(fungsiRaw, x) {
    let str = fungsiRaw.toLowerCase();
    str = str.replace(/sin/g, "Math.sin").replace(/cos/g, "Math.cos").replace(/tan/g, "Math.tan");
    str = str.replace(/exp/g, "Math.exp").replace(/ln/g, "Math.log").replace(/log10/g, "Math.log10").replace(/pi/g, "Math.PI");
    str = str.replace(/\^/g, "**");
    str = str.replace(/(\d+)([a-zA-Z_])/g, "$1*$2");
    str = str.replace(/(\d+)\(/g, "$1*(");

        const kodeEvaluasi = new Function('x', `return ${str};`);
        let hasil = kodeEvaluasi(x);
        if (isNaN(hasil) || !isFinite(hasil)) throw new Error("DomainError");
        return hasil;
}

function cetakLaporan(status, keterangan) {
    let laporan = `============================================================================\n`;
    laporan += ` STATUS PROGRAM : ${status}\n`;
    laporan += ` KETERANGAN     : ${keterangan}\n`;
    laporan += `============================================================================`;
    document.getElementById("output-box").innerHTML = laporan;
}

function hitungRegulaFalsi() {
    document.getElementById("tabel-container").innerHTML = '<p class="text-muted text-center pt-5 small">Data tabel akan dimuat di sini setelah kalkulasi sukses.</p>';
    if (chartInstance) { 
        chartInstance.destroy(); 
        chartInstance = null;
    }

    const fungsiRaw = document.getElementById("fungsi_raw").value;
    const aAwalInput = document.getElementById("a_awal").value;
    const bAwalInput = document.getElementById("b_awal").value;
    const tolInput = document.getElementById("tol").value;

    if (aAwalInput === "" || bAwalInput === "" || tolInput === "") {
        cetakLaporan("GAGAL (INPUT BUKAN ANGKA)", "Batas atau toleransi wajib diisi angka.");
        return;
    }

    let a_awal = parseFloat(aAwalInput);
    let b_awal = parseFloat(bAwalInput);

    // Tukar jika user memasukkan interval terbalik
    if (a_awal > b_awal) {
        [a_awal, b_awal] = [b_awal, a_awal];
    }

    const tol = parseFloat(tolInput);

    let fa_awal, fb_awal;
    try { fa_awal = evaluasiFungsi(fungsiRaw, a_awal); } catch (e) { cetakLaporan("GAGAL DI AWAL", `Batas bawah a = ${a_awal} bermasalah.`); return; }
    try { fb_awal = evaluasiFungsi(fungsiRaw, b_awal); } catch (e) { cetakLaporan("GAGAL DI AWAL", `Batas atas b = ${b_awal} bermasalah.`); return; }

    if (fa_awal * fb_awal >= 0) {
        cetakLaporan("GAGAL DI AWAL (TEOREMA NILAI ANTARA)", `f(${a_awal}) = ${fa_awal.toFixed(6)} dan f(${b_awal}) = ${fb_awal.toFixed(6)} MEMILIKI TANDA YANG SAMA.`);
        return;
    }

    let a = a_awal, b = b_awal;
    let dataIterasi = [];
    let maxIter = 10000, statusSukses = false, pesanGagalTengah = "";
    let c, fc, i;

    for (i = 1; i <= maxIter; i++) {
        let fa = evaluasiFungsi(fungsiRaw, a), fb = evaluasiFungsi(fungsiRaw, b);
        if (Math.abs(fb - fa) < 1e-15) { pesanGagalTengah = "Pembagian dengan nol pada rumus."; break; }
        
        c = b - (fb * (b - a)) / (fb - fa);
        try { fc = evaluasiFungsi(fungsiRaw, c); } catch (e) { pesanGagalTengah = `Titik c = ${c.toFixed(6)} error.`; break; }

        dataIterasi.push({ iterasi: i, a: a, b: b, c: c, fa: fa, fb: fb, fc: fc, abs_fc: Math.abs(fc) });
        
        if (Math.abs(fc) < tol) { statusSukses = true; break; }
        if (fa * fc < 0) { b = c; } else { a = c; }
    }

    if (statusSukses) {
        cetakLaporan("BERHASIL (KONVERGEN)", `Akar ditemukan pada iterasi ke-${i}\n NILAI AKAR (c) : ${c.toFixed(6)}`);
    } else {
        cetakLaporan("GAGAL", pesanGagalTengah || "Mencapai iterasi maksimal.");
    }

    if (dataIterasi.length === 0) return;

    const ctx = document.getElementById('grafikChart').getContext('2d');

    // Tentukan batas kiri dan kanan terlebih dahulu
    let kiri = Math.min(a_awal, b_awal);
    let kanan = Math.max(a_awal, b_awal);

    // Margin grafik
    let margin = (kanan - kiri) * 0.2;

    // Jika a == b, beri margin default
    if (margin === 0) margin = 1;

    let xMin = kiri - margin;
    let xMax = kanan + margin;

    // Untuk logaritma
    if (fungsiRaw.toLowerCase().includes("ln") ||
        fungsiRaw.toLowerCase().includes("log")) {
        xMin = Math.max(0.1, xMin);
    }

    let dataKurva = [], dataBintangAkar = [], dataBulatanProses = [];
    let langkah = (xMax - xMin) / 1000;
    for (let k = xMin; k <= xMax; k += langkah) {
        try { dataKurva.push({x: k, y: evaluasiFungsi(fungsiRaw, k)}); } catch(e){}
    }
    dataIterasi.slice(0, -1).forEach(row => dataBulatanProses.push({x: row.c, y: row.fc}));
    if (statusSukses) dataBintangAkar.push({x: c, y: fc});

    chartInstance = new Chart(ctx, {
        type: 'scatter',
        data: {
            datasets: [
                { label: `f(x)`, data: dataKurva, showLine: true, borderColor: 'blue', borderWidth: 2, pointRadius: 0 },
                { label: 'Iterasi', data: dataBulatanProses, backgroundColor: 'orange', borderColor: 'black', borderWidth: 0.8, pointRadius: 4 },
                { label: `Akar`, data: dataBintangAkar, backgroundColor: 'red', borderColor: 'red', pointStyle: 'triangle', pointRadius: 9 }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: {
                    type: 'linear',
                    position: 'bottom'
                },
                y: {
                    grace: '10%'
                }
            },
            plugins: {
                annotation: {
                    annotations: {
                        garisA: { type: 'line', xMin: a_awal, xMax: a_awal, borderColor: 'orange', borderWidth: 1, borderDash: [3, 3] },
                        garisB: { type: 'line', xMin: b_awal, xMax: b_awal, borderColor: 'purple', borderWidth: 1, borderDash: [3, 3] },
                        garisNol: { type: 'line', yMin: 0, yMax: 0, borderColor: 'black', borderWidth: 0.8, borderDash: [5, 5] }
                    }
                }
            }
        }
    });

    // --- TABEL ---
    let htmlTabel = `<table class="table table-striped table-hover table-bordered text-center align-middle mb-0">
        <thead>
            <tr>
                <th>Iterasi</th><th>a</th><th>b</th><th>c (Akar)</th><th>f(a)</th><th>f(b)</th><th>f(c)</th>
            </tr>
        </thead>
        <tbody>`;
    dataIterasi.forEach(row => {
        htmlTabel += `<tr>
            <td>${row.iterasi}</td><td>${row.a.toFixed(6)}</td><td>${row.b.toFixed(6)}</td>
            <td class="fw-bold text-danger">${row.c.toFixed(6)}</td><td>${row.fa.toFixed(6)}</td>
            <td>${row.fb.toFixed(6)}</td><td>${row.fc.toFixed(6)}</td>
        </tr>`;
    });
    htmlTabel += `</tbody></table>`;
    document.getElementById("tabel-container").innerHTML = htmlTabel;x
}
</script>

</body>
</html>
